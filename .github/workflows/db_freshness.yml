name: Daily DB freshness check

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install requirements
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install requests pymongo flask

      - name: Run freshness check
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          DB_MODE: ${{ secrets.DB_MODE }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 check_db_current.py --alert-days 1 --email
