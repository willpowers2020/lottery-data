<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLottoData Query Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { background: #f5f5f5; }
        .card { border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .welcome-text { color: #2196F3; font-weight: 600; }
        .tab-active { border-bottom: 2px solid #2196F3; color: #2196F3; }
        .btn-primary { background: #2196F3; border: none; }
        .results-table { max-height: 400px; overflow-y: auto; }
        .hot { color: #f44336; font-weight: bold; }
        .cold { color: #2196F3; font-weight: bold; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="card p-4 mb-4">
            <h4>Welcome <span class="welcome-text">User</span></h4>
            <p class="text-muted">Use the algorithms to predict your next lottery wins</p>
            
            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link active" href="#" id="singleGameTab">Single game</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" id="allGamesTab">All games</a>
                </li>
            </ul>
            
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Country</label>
                    <select class="form-select" id="country">
                        <option value="USA" selected>USA</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">State</label>
                    <select class="form-select" id="state">
                        <option value="">Select state...</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Game</label>
                    <select class="form-select" id="game">
                        <option value="">Select game...</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-secondary w-100" id="subscribeBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4z"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="row g-3 mt-2">
                <div class="col-md-6">
                    <label class="form-label">Data available range</label>
                    <input type="text" class="form-control" id="dataRange" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Choose a date range</label>
                    <input type="text" class="form-control" id="dateRange" placeholder="Select dates...">
                </div>
            </div>
            
            <div class="row g-3 mt-2">
                <div class="col-md-6">
                    <label class="form-label">Choose a draw time</label>
                    <select class="form-select" id="drawTime">
                        <option value="All" selected>All</option>
                        <option value="Midday">Midday</option>
                        <option value="Evening">Evening</option>
                    </select>
                </div>
                <div class="col-md-6 d-flex align-items-end">
                    <button class="btn btn-primary w-100" id="searchBtn">Search</button>
                </div>
            </div>
        </div>
        
        <!-- Results Section -->
        <div class="row">
            <div class="col-md-8">
                <div class="card p-3 mb-4">
                    <h5>Results <span class="badge bg-primary" id="resultCount">0</span></h5>
                    <div class="results-table">
                        <table class="table table-striped table-sm">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Numbers</th>
                                    <th>Sorted</th>
                                    <th>Sum</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card p-3 mb-3 stat-card">
                    <h6>Total Draws</h6>
                    <h2 id="totalDraws">0</h2>
                </div>
                
                <div class="card p-3 mb-3">
                    <h6>🔥 Hot Digits</h6>
                    <div id="hotDigits" class="hot"></div>
                </div>
                
                <div class="card p-3 mb-3">
                    <h6>❄️ Cold Digits</h6>
                    <div id="coldDigits" class="cold"></div>
                </div>
                
                <div class="card p-3 mb-3">
                    <h6>Top Patterns</h6>
                    <div id="topPatterns"></div>
                </div>
                
                <div class="card p-3">
                    <h6>Top Sums</h6>
                    <div id="topSums"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        let stateId = null;
        let gameId = null;
        let minDate = null;
        let maxDate = null;
        let datePicker = null;
        
        // Load states
        async function loadStates() {
            const resp = await fetch('/api/states');
            const states = await resp.json();
            const select = document.getElementById('state');
            select.innerHTML = '<option value="">Select state...</option>';
            states.forEach(s => {
                select.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });
        }
        
        // Load games for state
        async function loadGames(sid) {
            stateId = sid;
            const resp = await fetch(`/api/games/${sid}`);
            const games = await resp.json();
            const select = document.getElementById('game');
            select.innerHTML = '<option value="">Select game...</option>';
            games.forEach(g => {
                select.innerHTML += `<option value="${g.id}">${g.name}</option>`;
            });
        }
        
        // Load game info (date range)
        async function loadGameInfo(gid) {
            gameId = gid;
            const resp = await fetch(`/api/game_info/${gid}`);
            const info = await resp.json();
            minDate = info.min_date;
            maxDate = info.max_date;
            document.getElementById('dataRange').value = `${formatDate(minDate)} - ${formatDate(maxDate)}`;
            
            // Initialize date picker
            if (datePicker) datePicker.destroy();
            datePicker = flatpickr('#dateRange', {
                mode: 'range',
                minDate: minDate,
                maxDate: maxDate,
                defaultDate: [maxDate, maxDate],
                dateFormat: 'm/d/Y'
            });
        }
        
        function formatDate(d) {
            if (!d) return '';
            const date = new Date(d);
            return `${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getDate().toString().padStart(2,'0')}/${date.getFullYear()}`;
        }
        
        // Search
        async function search() {
            if (!gameId) return alert('Please select a game');
            
            const dates = datePicker.selectedDates;
            if (dates.length < 2) return alert('Please select a date range');
            
            const startDate = dates[0].toISOString().split('T')[0];
            const endDate = dates[1].toISOString().split('T')[0];
            const drawTime = document.getElementById('drawTime').value;
            
            // Get draws
            const drawsResp = await fetch('/api/draws', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ game_id: gameId, start_date: startDate, end_date: endDate, draw_time: drawTime })
            });
            const draws = await drawsResp.json();
            
            // Display results
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';
            draws.forEach(d => {
                tbody.innerHTML += `<tr>
                    <td>${d.draw_date}</td>
                    <td><strong>${d.value}</strong></td>
                    <td>${d.sorted_value}</td>
                    <td>${d.sums}</td>
                </tr>`;
            });
            document.getElementById('resultCount').textContent = draws.length;
            
            // Get analysis
            const analysisResp = await fetch('/api/analysis', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ game_id: gameId, start_date: startDate, end_date: endDate })
            });
            const analysis = await analysisResp.json();
            
            document.getElementById('totalDraws').textContent = analysis.total_draws;
            document.getElementById('hotDigits').textContent = analysis.hot_digits.map(h => `${h[0]}(${h[1]})`).join(', ');
            document.getElementById('coldDigits').textContent = analysis.cold_digits.map(c => `${c[0]}(${c[1]})`).join(', ');
            document.getElementById('topPatterns').innerHTML = analysis.top_patterns.slice(0,5).map(p => `<div>${p[0]}: ${p[1]}x</div>`).join('');
            document.getElementById('topSums').innerHTML = analysis.top_sums.slice(0,5).map(s => `<div>Sum ${s[0]}: ${s[1]}x</div>`).join('');
        }
        
        // Event listeners
        document.getElementById('state').addEventListener('change', e => loadGames(e.target.value));
        document.getElementById('game').addEventListener('change', e => loadGameInfo(e.target.value));
        document.getElementById('searchBtn').addEventListener('click', search);
        
        // Initialize
        loadStates();
    </script>
</body>
</html>
