<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLottoData Query Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { background: #f5f5f5; }
        .card { border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .welcome-text { color: #2196F3; font-weight: 600; }
        .btn-primary { background: #2196F3; border: none; border-radius: 8px; }
        .btn-primary:hover { background: #1976D2; }
        .results-table { max-height: 500px; overflow-y: auto; }
        .hot { color: #f44336; font-weight: bold; }
        .cold { color: #2196F3; font-weight: bold; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; }
        .group-option { font-weight: bold; background: #e3f2fd !important; }
        .all-option { font-weight: bold; background: #c8e6c9 !important; }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { background: #e3f2fd; }
        th.sortable::after { content: ' ⇅'; opacity: 0.3; }
        th.sort-asc::after { content: ' ↑'; opacity: 1; }
        th.sort-desc::after { content: ' ↓'; opacity: 1; }
        .tod-midday { color: #ff9800; }
        .tod-evening { color: #673ab7; }
        .tod-morning { color: #4caf50; }
        .tod-day { color: #2196f3; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="card p-4 mb-4">
            <h4>Welcome <span class="welcome-text">User</span></h4>
            <p class="text-muted">Use the algorithms to predict your next lottery wins</p>
            
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Country</label>
                    <select class="form-select" id="country">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">State/Region</label>
                    <select class="form-select" id="state">
                        <option value="">Select country first...</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Game</label>
                    <select class="form-select" id="game">
                        <option value="">Select state first...</option>
                    </select>
                </div>
            </div>
            
            <div class="row g-3 mt-2">
                <div class="col-md-6">
                    <label class="form-label">Data available range</label>
                    <input type="text" class="form-control" id="dataRange" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Choose a date range</label>
                    <input type="text" class="form-control" id="dateRange" placeholder="Select dates...">
                </div>
            </div>
            
            <div class="row g-3 mt-3">
                <div class="col-12">
                    <button class="btn btn-primary w-100 py-2" id="searchBtn">Search</button>
                </div>
            </div>
        </div>
        
        <!-- Results Section -->
        <div class="row">
            <div class="col-md-8">
                <div class="card p-3 mb-4">
                    <h5>Results <span class="badge bg-primary" id="resultCount">0</span></h5>
                    <div class="results-table">
                        <table class="table table-striped table-sm" id="resultsTable">
                            <thead>
                                <tr>
                                    <th class="sortable" data-col="draw_date">Date</th>
                                    <th class="sortable" data-col="country">Country</th>
                                    <th class="sortable" data-col="state_name">State</th>
                                    <th class="sortable" data-col="game_name">Game</th>
                                    <th class="sortable" data-col="tod">TOD</th>
                                    <th class="sortable" data-col="value">Draws</th>
                                    <th class="sortable" data-col="sorted_value">Sorted</th>
                                    <th class="sortable" data-col="sums">Sum</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card p-3 mb-3 stat-card">
                    <h6>Total Draws</h6>
                    <h2 id="totalDraws">0</h2>
                </div>
                
                <div class="card p-3 mb-3">
                    <h6>🔥 Hot Digits</h6>
                    <div id="hotDigits" class="hot"></div>
                </div>
                
                <div class="card p-3 mb-3">
                    <h6>❄️ Cold Digits</h6>
                    <div id="coldDigits" class="cold"></div>
                </div>
                
                <div class="card p-3 mb-3">
                    <h6>Top Patterns</h6>
                    <div id="topPatterns"></div>
                </div>
                
                <div class="card p-3">
                    <h6>Top Sums</h6>
                    <div id="topSums"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        let currentCountry = 'all';
        let currentState = 'all';
        let gameIds = null;
        let minDate = null;
        let maxDate = null;
        let datePicker = null;
        let drawsData = [];
        let sortCol = 'draw_date';
        let sortDir = 'desc';
        
        function getTodClass(tod) {
            if (!tod) return '';
            const t = tod.toLowerCase();
            if (t.includes('midday')) return 'tod-midday';
            if (t.includes('evening') || t.includes('night')) return 'tod-evening';
            if (t.includes('morning')) return 'tod-morning';
            if (t.includes('day')) return 'tod-day';
            return '';
        }
        
        async function loadCountries() {
            const resp = await fetch('/api/countries');
            const countries = await resp.json();
            const select = document.getElementById('country');
            select.innerHTML = '<option value="all" class="all-option">🌍 All Countries</option>';
            countries.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
        }
        
        async function loadStates(country) {
            currentCountry = country;
            const resp = await fetch(`/api/states/${country}`);
            const states = await resp.json();
            const select = document.getElementById('state');
            select.innerHTML = '<option value="all" class="all-option">🌎 All States/Regions</option>';
            states.forEach(s => {
                select.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });
            document.getElementById('game').innerHTML = '<option value="">Select state first...</option>';
        }
        
        async function loadGames(state) {
            currentState = state;
            const resp = await fetch(`/api/games/${currentCountry}/${state}`);
            const games = await resp.json();
            const select = document.getElementById('game');
            select.innerHTML = '<option value="">Select game...</option>';
            games.forEach(g => {
                const cls = g.is_group ? 'group-option' : '';
                select.innerHTML += `<option value="${g.id}" class="${cls}">${g.name}</option>`;
            });
        }
        
        async function loadGameInfo(gids) {
            gameIds = gids;
            const resp = await fetch('/api/game_info', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ game_ids: gids, country: currentCountry })
            });
            const info = await resp.json();
            minDate = info.min_date;
            maxDate = info.max_date;
            document.getElementById('dataRange').value = `${formatDate(minDate)} - ${formatDate(maxDate)} (${info.total.toLocaleString()} draws)`;
            
            if (datePicker) datePicker.destroy();
            datePicker = flatpickr('#dateRange', {
                mode: 'range',
                minDate: minDate,
                maxDate: maxDate,
                defaultDate: [maxDate, maxDate],
                dateFormat: 'm/d/Y'
            });
        }
        
        function formatDate(d) {
            if (!d) return '';
            const date = new Date(d);
            return `${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getDate().toString().padStart(2,'0')}/${date.getFullYear()}`;
        }
        
        function renderTable() {
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';
            
            // Sort data
            const sorted = [...drawsData].sort((a, b) => {
                let aVal = a[sortCol];
                let bVal = b[sortCol];
                
                // Handle numeric sorting for sums
                if (sortCol === 'sums') {
                    aVal = parseInt(aVal) || 0;
                    bVal = parseInt(bVal) || 0;
                }
                
                // Handle empty values
                if (!aVal && !bVal) return 0;
                if (!aVal) return sortDir === 'asc' ? -1 : 1;
                if (!bVal) return sortDir === 'asc' ? 1 : -1;
                
                if (aVal < bVal) return sortDir === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDir === 'asc' ? 1 : -1;
                return 0;
            });
            
            sorted.forEach(d => {
                const todDisplay = d.tod || '-';
                const todClass = getTodClass(d.tod);
                tbody.innerHTML += `<tr>
                    <td>${d.draw_date || ''}</td>
                    <td><small>${d.country || ''}</small></td>
                    <td><small>${d.state_name || ''}</small></td>
                    <td><small>${d.game_name || ''}</small></td>
                    <td><small class="${todClass}">${todDisplay}</small></td>
                    <td><strong>${d.value || ''}</strong></td>
                    <td>${d.sorted_value || ''}</td>
                    <td>${d.sums || ''}</td>
                </tr>`;
            });
            
            // Update header styles
            document.querySelectorAll('th.sortable').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (th.dataset.col === sortCol) {
                    th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
                }
            });
        }
        
        async function search() {
            if (!gameIds) return alert('Please select a game');
            
            const dates = datePicker.selectedDates;
            if (dates.length < 2) return alert('Please select a date range');
            
            const startDate = dates[0].toISOString().split('T')[0];
            const endDate = dates[1].toISOString().split('T')[0];
            
            const drawsResp = await fetch('/api/draws', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ game_ids: gameIds, country: currentCountry, start_date: startDate, end_date: endDate })
            });
            drawsData = await drawsResp.json();
            
            document.getElementById('resultCount').textContent = drawsData.length;
            renderTable();
            
            const analysisResp = await fetch('/api/analysis', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ game_ids: gameIds, country: currentCountry, start_date: startDate, end_date: endDate })
            });
            const analysis = await analysisResp.json();
            
            document.getElementById('totalDraws').textContent = analysis.total_draws;
            document.getElementById('hotDigits').textContent = analysis.hot_digits.map(h => `${h[0]}(${h[1]})`).join(', ');
            document.getElementById('coldDigits').textContent = analysis.cold_digits.map(c => `${c[0]}(${c[1]})`).join(', ');
            document.getElementById('topPatterns').innerHTML = analysis.top_patterns.slice(0,5).map(p => `<div>${p[0]}: ${p[1]}x</div>`).join('');
            document.getElementById('topSums').innerHTML = analysis.top_sums.slice(0,5).map(s => `<div>Sum ${s[0]}: ${s[1]}x</div>`).join('');
        }
        
        // Sortable headers
        document.querySelectorAll('th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const col = th.dataset.col;
                if (sortCol === col) {
                    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    sortCol = col;
                    sortDir = 'asc';
                }
                renderTable();
            });
        });
        
        document.getElementById('country').addEventListener('change', e => loadStates(e.target.value));
        document.getElementById('state').addEventListener('change', e => loadGames(e.target.value));
        document.getElementById('game').addEventListener('change', e => loadGameInfo(e.target.value));
        document.getElementById('searchBtn').addEventListener('click', search);
        
        loadCountries();
    </script>
</body>
</html>
